# ─── Neo-Hexo 示例站点配置 ───────────────────────────────────────────────────

# 站点信息
title: Neo-Hexo 示例站点
subtitle: 一个现代化的静态博客
description: 使用 Neo-Hexo 构建的示例博客站点，展示框架的核心功能。
author: Neo-Hexo Team
language:
  - zh-CN
  - en
timezone: Asia/Shanghai

# URL
url: http://localhost:4000
root: /

# 目录
sourceDir: source
publicDir: public

# 永久链接
permalink: ":year/:month/:day/:title/"

# 默认布局
defaultLayout: post

# 插件
plugins:
  # 渲染器 (enforce: pre — 最先加载)
  - renderer-markdown
  - renderer-edge

  # 处理器
  - processor

  # 过滤器
  - name: filter
    externalLinks: true
    metaGenerator: true

  # 语法高亮
  - name: highlight
    theme: github-dark

  # 生成器
  - generator

  # 辅助函数
  - helper

  # 片段注入
  - injector

  # 控制台命令
  - console

  # 主题
  - name: theme
    dir: theme

  # 开发服务器
  - name: server
    port: 4000
